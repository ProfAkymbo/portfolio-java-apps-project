name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Build and Test both Applications
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java app
        working-directory: ./java-app
        run: mvn clean package -DskipTests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test portfolio app
        working-directory: ./my-portfolio
        run: |
          pip install -r requirements.txt
          python3 -c "from app import app; c = app.test_client(); r = c.get('/health'); assert r.status_code == 200; print('OK')"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Java Image
        uses: docker/build-push-action@v6
        with:
          context: ./java-app
          file: ./java-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest

      - name: Build and Push Python Image
        uses: docker/build-push-action@v6
        with:
          context: ./my-portfolio
          file: ./my-portfolio/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest

  # 2. Provision Infrastructure via Terraform
  infrastructure:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      ec2_ip: ${{ steps.terraform.outputs.EC2_IP }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}

      - name: Export EC2 IP
        id: terraform
        working-directory: ./terraform
        run: echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  # 3. Deploy to the EC2 Instance
  deploy:
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - name: Wait for EC2 SSH access
        run: |
          for i in {1..60}; do
            if nc -z ${{ needs.infrastructure.outputs.ec2_ip }} 22; then
              echo "EC2 SSH port is open"
              exit 0
            fi
            echo "Waiting for EC2 SSH... (attempt $i/60)"
            sleep 5
          done
          echo "EC2 failed to become ready"
          exit 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.infrastructure.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure Docker is installed and running
            sudo yum update -y
            sudo yum install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user

            # Force refresh group memberships without logging out
            newgrp docker << 'EOD'

            # Pull latest application images
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest

            # Stop and remove existing running containers if present
            docker stop java-app python-app || true
            docker rm java-app python-app || true

            # Run Java App on host port 8080 (Tomcat inside container uses 8080)
            docker run -d -p 8080:8080 --name java-app ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest

            # Run Python App on host port 5000 (Gunicorn inside container uses 5000)
            docker run -d -p 5000:5000 --name python-app ${{ secrets.DOCKER_USERNAME }}/my-portfolio:latest
            
            EOD
